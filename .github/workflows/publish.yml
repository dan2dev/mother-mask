name: Publish to NPM

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    if: ${{ !contains(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mother-mask

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Bump minor version and tag
        id: version
        run: |
          bun pm version minor --message "chore(release): %s [skip ci]"
          version="$(bun pm pkg get version | tr -d '"')"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: bun publish --access public
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push release commit and tag
        run: |
          git push origin HEAD:${{ github.ref_name }}
          git push origin "refs/tags/${{ steps.version.outputs.tag }}"
